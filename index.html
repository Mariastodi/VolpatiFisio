<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volpati Fisio Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💙</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <div id="loginSection" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
            <h1 class="text-2xl font-bold text-blue-900 mb-2">Volpati Fisio Pro</h1>
            <p class="text-slate-500 mb-6 text-sm">Acesse sua conta para sincronizar dados.</p>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="E-mail" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="loginSenha" placeholder="Senha" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <button id="btnLogin" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all">Entrar</button>
            </div>
        </div>
    </div>

    <div id="appContent" class="hidden max-w-6xl mx-auto px-4 py-8">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-blue-900 tracking-tight">Volpati Fisio <span class="font-light text-blue-500">Pro</span></h1>
                <p class="text-blue-600 font-medium">Gestão Sincronizada de Pacientes</p>
            </div>
            <button id="btnLogout" class="text-xs text-red-500 font-bold border border-red-200 px-3 py-1 rounded-lg hover:bg-red-50">Sair</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100">
                    <h2 class="text-lg font-semibold mb-4 text-blue-800" id="formTitle">Novo Cadastro</h2>
                    <input type="hidden" id="editId" value="">
                    <div class="space-y-4">
                        <input type="text" id="pacienteNome" placeholder="Nome do Paciente" class="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" id="pacienteProcedimento" placeholder="Procedimento" class="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="date" id="dataCirurgia" class="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <button id="btnSalvar" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold shadow-lg transition-all active:scale-95">Salvar Paciente</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100">
                    <h2 class="text-lg font-semibold mb-4 text-blue-800">Meus Pacientes</h2>
                    <input type="text" id="buscaPaciente" placeholder="Buscar..." class="w-full mb-4 p-2 text-sm border rounded-lg outline-none">
                    <div id="listaPacientes" class="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar"></div>
                </div>
            </aside>

            <section class="lg:col-span-8">
                <div id="placeholder" class="bg-white border-2 border-dashed border-blue-100 rounded-3xl p-20 text-center">
                    <div class="text-5xl mb-4">📋</div>
                    <h3 class="text-slate-400 font-medium">Selecione um paciente</h3>
                </div>

                <div id="cronogramaContainer" class="hidden">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-blue-100 mb-6">
                        <div class="flex justify-between items-start mb-6">
                            <div id="nomeDisplay"></div>
                            <button id="btnZap" class="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-xl font-bold text-sm shadow-md">Copiar para WhatsApp</button>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-slate-50">
                            <div>
                                <label class="block text-[11px] font-bold text-blue-500 uppercase tracking-widest mb-3">Checklist de Envios:</label>
                                <div id="checklistEnvios" class="space-y-2">
                                    </div>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-blue-500 uppercase tracking-widest mb-3">Lembretes & Notas:</label>
                                <textarea id="notasRapidas" class="w-full p-3 text-sm bg-slate-50 border border-slate-100 rounded-xl outline-none h-32 focus:bg-white transition-colors" 
                                    placeholder="Anote adiamentos ou observações aqui..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div id="timeline" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </section>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
